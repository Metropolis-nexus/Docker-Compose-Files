services:
  # Frontend
  web:
    container_name: jitsi-web
    image: ghcr.io/jitsi-contrib/hardened-images/web:stable
    restart: unless-stopped
    volumes:
      - ./web:/config:Z,ro
      - ./transcripts:/usr/share/jitsi-meet/transcripts:Z,ro
      - ./web/crontabs:/var/spool/cron/crontabs:Z
      - ./web/load-test:/usr/share/jitsi-meet/load-test:Z
      - ./certs/fullchain.pem:/config/keys/cert.crt:Z,ro
      - ./certs/privkey.pem:/config/keys/cert.key:Z,ro
    ports:
      - 8443:8443/tcp
    networks:
      - jitsi
      - etherpad
    depends_on:
      - jvb
    env_file:
      - common.env
    user: "300005:300005"
    read_only: true
    tmpfs:
      - /run:exec,size=16M,uid=300005,gid=300005
      - /tmp:size=16M,uid=300005,gid=300005
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

  # XMPP server
  prosody:
    container_name: jitsi-prosody
    image: ghcr.io/jitsi-contrib/hardened-images/prosody:stable
    restart: unless-stopped
    volumes:
      - ./prosody/config:/config:Z,ro
      - ./prosody/prosody-plugins-custom:/prosody-plugins-custom:Z,ro
      - ./prosody/storage:/var/lib/prosody:Z
    networks:
      jitsi:
        aliases:
          - xmpp.meet.jitsi
    env_file:
      - common.env
      - prosody.env
    user: "300006:300006"
    read_only: true
    tmpfs:
      - /run:exec,size=16M,uid=300006,gid=300006
      - /tmp:size=16M,uid=300006,gid=300006
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

  # Focus component
  jicofo:
    container_name: jitsi-jicofo
    image: ghcr.io/jitsi-contrib/hardened-images/jicofo:stable
    restart: unless-stopped
    volumes:
      - ./jicofo:/config:Z,ro
    networks:
      - jitsi
    depends_on:
      - prosody
    env_file:
      - common.env
      - jicofo.env
    user: "300018:300018"
    read_only: true
    tmpfs:
      - /run:exec,size=16M,uid=300018,gid=300018
      - /tmp:size=16M,uid=300018,gid=300018
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

  # Video bridge
  jvb:
    container_name: jitsi-jvb
    image: ghcr.io/jitsi-contrib/hardened-images/jvb:stable
    restart: unless-stopped
    volumes:
      - ./jvb:/config:Z,ro
    ports:
      - 10000:10000/udp
    networks:
      - jitsi
    depends_on:
      - prosody
    env_file:
      - common.env
      - jvb.env
    user: "300019:300019"
    read_only: true
    tmpfs:
      - /run:exec,size=16M,uid=300019,gid=300019
      - /tmp:size=16M,uid=300019,gid=300019
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL
    runtime: crun

  # Whiteboard
  whiteboard:
    container_name: jitsi-whiteboard
    image: jitsi/excalidraw-backend:21
    restart: unless-stopped
    networks:
      jitsi:
        aliases:
          - whiteboard.meet.jitsi
    depends_on:
      - web
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

  # Shared documents
  etherpad:
    container_name: jitsi-etherpad
    image: etherpad/etherpad:latest
    restart: unless-stopped
    ports:
      - 9001:9001/tcp
    networks:
      etherpad:
        aliases:
          - etherpad.meet.jitsi
      postgres:
    env_file:
      - etherpad.env
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

  postgres:
    container_name: jitsi-postgres
    image: ghcr.io/polarix-containers/postgres:18
    restart: unless-stopped
    volumes:
      - ./postgres:/var/lib/postgresql/18/docker:Z
      - ./postgres_dump:/dump:Z
    networks:
      - postgres
    env_file:
      - postgres.env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "etherpad"]
      interval: 15s
      timeout: 5s
    user: "200012:200012"
    read_only: true
    tmpfs:
      - /var/run/postgresql:size=50M,mode=0770,uid=200012,gid=200012,noexec,nosuid,nodev
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

  # OIDC adapter
  oidc-adapter:
    container_name: jitsi-oidc-adapter
    image: ghcr.io/jitsi-contrib/jitsi-oidc-adapter:latest
    restart: unless-stopped
    ports:
      - 9000:9000/tcp
    networks:
      - oidc-adapter
    env_file:
      - oidc-adapter.env
    user: "300007:300007"
    read_only: true
    security_opt:
      - "no-new-privileges=true"
    cap_drop:
      - ALL

networks:
  jitsi:
  etherpad:
  postgres:
    internal: true
  oidc-adapter:
